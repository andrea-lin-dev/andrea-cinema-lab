<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Calico cat with movie icon">
  <defs>
    <style>
      .line { stroke:#111; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; fill:none; }
      .eye  { stroke:#111; stroke-width:3.8; stroke-linecap:round; }
      .wh   { stroke:#111; stroke-width:1.6; stroke-linecap:round; fill:none; }
    </style>
  </defs>

  <!-- Cat head base (white) -->
  <path fill="#ffffff" d="M18 30
                          L16 20
                          Q22 22 26 28
                          Q32 26 38 28
                          Q42 22 48 20
                          L46 30
                          Q52 34 50 42
                          Q46 52 32 52
                          Q18 52 14 42
                          Q12 34 18 30Z"/>

  <!-- Calico patches (keep chunky for favicon) -->
  <!-- Orange patch (left) -->
  <path fill="#F4A261" d="M18 30
                          L16 20
                          Q22 22 26 28
                          Q24 33 21 37
                          Q18 36 18 30Z"/>

  <!-- Black patch (right-top) -->
  <path fill="#222222" d="M38 28
                          Q42 22 48 20
                          L46 30
                          Q44 34 40 36
                          Q38 33 38 28Z"/>

  <!-- Outline -->
  <path class="line" d="M18 30
                        L16 20
                        Q22 22 26 28
                        Q32 26 38 28
                        Q42 22 48 20
                        L46 30
                        Q52 34 50 42
                        Q46 52 32 52
                        Q18 52 14 42
                        Q12 34 18 30Z"/>

  <!-- Eyes -->
  <path class="eye" d="M25 40h0"/>
  <path class="eye" d="M39 40h0"/>

  <!-- Nose -->
  <circle cx="32" cy="44" r="1.7" fill="#111"/>

  <!-- Whiskers: 3 per side, thinner, fanning outward -->
  <!-- Left -->
  <path class="wh" d="M21 44 L8 40"/>
  <path class="wh" d="M21 46 L7 46"/>
  <path class="wh" d="M21 48 L8 52"/>
  <!-- Right -->
  <path class="wh" d="M43 44 L56 40"/>
  <path class="wh" d="M43 46 L57 46"/>
  <path class="wh" d="M43 48 L56 52"/>

  <!-- Movie icon: video frame + play button + sprocket holes -->
  <g transform="translate(39 36)">
    <!-- outer frame -->
    <rect x="0" y="0" width="23" height="18" rx="4" fill="#111"/>
    <!-- sprocket holes (simple + big) -->
    <g fill="#fff">
      <rect x="3"  y="3"  width="3" height="3" rx="1"/>
      <rect x="3"  y="12" width="3" height="3" rx="1"/>
      <rect x="17" y="3"  width="3" height="3" rx="1"/>
      <rect x="17" y="12" width="3" height="3" rx="1"/>
    </g>
    <!-- inner screen -->
    <rect x="7" y="3" width="9" height="12" rx="2" fill="#fff"/>
    <!-- play triangle -->
    <path d="M11 7 L11 11 L14.5 9 Z" fill="#111"/>
  </g>
</svg>
